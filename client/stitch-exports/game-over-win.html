<style>
        body {
            background-color: #0D0D0D;
            margin: 0;
            overflow: hidden;
            color: #e5e2e1;
        }
        .void-gradient {
            background: radial-gradient(circle at center, rgba(217, 4, 41, 0.05) 0%, rgba(13, 13, 13, 1) 70%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .crimson-glow:hover {
            box-shadow: 0 0 20px rgba(217, 4, 41, 0.4);
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(217, 4, 41, 0.1);
            position: absolute;
            animation: scan 8s linear infinite;
            z-index: 5;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .glitch-text:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>

<body class="font-body-rt flex flex-col h-screen relative">

<span class="font-label-sm text-label-sm text-primary uppercase">SKOR</span>

<!-- Interactive Layer: Mouse-following glow -->
<div class="fixed w-[600px] h-[600px] rounded-full pointer-events-none opacity-20 mix-blend-screen transition-opacity duration-1000" id="cursor-glow" style="background: radial-gradient(circle, rgba(217, 4, 41, 0.15) 0%, rgba(13, 13, 13, 0) 70%); transform: translate(-50%, -50%); top: 50%; left: 50%;">
</div>
<script>
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
            glow.style.opacity = '0.3';
        });

        window.addEventListener('mouseleave', () => {
            glow.style.opacity = '0';
        });

        // Trigger subtle animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-pulse');
            elements.forEach((el, index) => {
                el.style.animationDelay = (index * 0.2) + 's';
            });
        });
    </script>
