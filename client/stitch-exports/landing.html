<style>
        body {
            background-color: #0D0D0D;
            overflow: hidden;
            cursor: crosshair;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .void-gradient {
            background: radial-gradient(circle at center, rgba(217, 4, 41, 0.03) 0%, rgba(13, 13, 13, 0) 70%);
        }

        .focus-ring {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .letter-spacing-extreme {
            letter-spacing: 0.5em;
        }

        /* Ambient pulse animation */
        @keyframes subtlePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .pulse-layer {
            animation: subtlePulse 8s infinite ease-in-out;
        }

<body class="text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full flex justify-between items-center px-gutter py-4 z-50 border-b border-white/10 bg-background dark:bg-background">
<div class="font-display-lg text-display-lg-mobile tracking-widest text-on-surface uppercase font-bold">
            ANTIGRAVITY
        </div>
<div class="flex items-center space-gap-4 md:space-x-8">
<button class="material-symbols-outlined text-primary transition-colors duration-300 hover:text-on-surface" data-icon="sensors">sensors</button>
<button class="material-symbols-outlined text-primary transition-colors duration-300 hover:text-on-surface ml-4" data-icon="wifi_tethering">wifi_tethering</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden px-gutter">
<!-- Atmospheric Background Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 void-gradient"></div>
<div class="absolute inset-0 pulse-layer bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10"></div>
<!-- Interactive Cursor Glow (via JS) -->
<div class="absolute w-96 h-96 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none -translate-x-1/2 -translate-y-1/2" id="cursor-glow"></div>
</div>
<!-- Central Content Container -->
<section class="relative z-10 w-full max-w-2xl text-center space-y-void-lg">
<!-- Branding & Tagline -->
<div class="space-y-6">
<h1 class="font-display-lg text-display-lg md:text-[64px] uppercase tracking-[1em] translate-x-[0.5em] text-on-surface">
                    ANTIGRAVITY
                </h1>
<p class="font-label-sm text-label-sm text-on-secondary-container uppercase opacity-60 tracking-widest">
                    Karanlıkta avla, sessizce vur.
                </p>
</div>
<!-- Interaction Cluster -->
<div class="flex flex-col items-center space-y-12 w-full max-w-sm mx-auto">
<div class="w-full relative group">
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-white/20 px-0 py-4 text-center font-headline-md text-headline-md focus:ring-0 focus:border-primary-container focus:border-b-2 placeholder:text-secondary-container transition-all duration-500 outline-none uppercase tracking-[0.2em]" placeholder="Oda kodu" type="text"/>
<!-- Subtle underline highlight -->
<div class="absolute bottom-0 left-1/2 w-0 h-[2px] bg-primary-container group-focus-within:w-full group-focus-within:left-0 transition-all duration-700"></div>
</div>
<button class="group relative w-full overflow-hidden px-12 py-5 bg-primary-container text-on-primary-container font-label-sm text-label-sm uppercase tracking-[0.3em] hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span class="relative z-10">Katıl</span>
<!-- Hover Effect Layer -->
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
</button>
</div>
</section>
<!-- Decorative Radar Element (Bottom Right) -->
<div class="absolute bottom-void-lg right-void-lg hidden lg:block opacity-20 hover:opacity-40 transition-opacity duration-500">
<div class="relative w-32 h-32 flex items-center justify-center border border-white/10 rounded-full">
<div class="absolute w-1/2 h-[1px] bg-primary-container origin-left left-1/2 animate-[spin_4s_linear_infinite]"></div>
<div class="w-2 h-2 bg-primary-container rounded-full animate-pulse"></div>
<div class="absolute -top-6 left-1/2 -translate-x-1/2 font-label-sm text-[8px] tracking-tighter uppercase whitespace-nowrap">
                    Arena Scan: Active
                </div>
</div>
</div>
</main>
<!-- Footer Bar -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-gutter py-unit z-40 opacity-40 border-t border-white/5 bg-transparent">
<div class="font-label-sm text-label-sm uppercase tracking-widest py-4">
            v0.9.4 // THE VOID REMAINS
        </div>
<nav class="flex space-x-gutter py-4">
<a class="font-label-sm text-label-sm uppercase text-on-secondary-container hover:text-on-surface hover:bg-surface-container-highest/20 px-3 py-1 transition-all duration-500" href="#">TERMINAL</a>
<a class="font-label-sm text-label-sm uppercase text-on-secondary-container hover:text-on-surface hover:bg-surface-container-highest/20 px-3 py-1 transition-all duration-500" href="#">CREDITS</a>
<a class="font-label-sm text-label-sm uppercase text-on-secondary-container hover:text-on-surface hover:bg-surface-container-highest/20 px-3 py-1 transition-all duration-500" href="#">INTEL</a>
</nav>
</footer>
<script>
        // Micro-interaction for cursor glow follow
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            glow.style.left = `${x}px`;
            glow.style.top = `${y}px`;
        });

        // Room code input restriction (visual only for this demo)
        const input = document.querySelector('input');
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
        });

        // Simulating focus persistence
        document.addEventListener('click', (e) => {
            if (e.target === document.body) {
                // Background click doesn't trigger anything yet
            }
        });
    </script>
</body></html>
