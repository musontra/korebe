<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .the-void-gradient {
            background: radial-gradient(circle at center, transparent 0%, #0D0D0D 85%);
        }

        .crimson-glow {
            box-shadow: 0 0 20px rgba(217, 4, 41, 0.2);
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, rgba(217, 4, 41, 0.05), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        .glitch-text {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.5px 0 0 #D90429, -0.5px 0 0 #0074a0; }
            2% { text-shadow: 2px 0 0 #D90429, -2px 0 0 #0074a0; }
            4% { text-shadow: 0 0 0 #D90429, 0 0 0 #0074a0; }
            100% { text-shadow: 0 0 0 #D90429, 0 0 0 #0074a0; }
        }

<script>
        // Micro-interaction: Mouse tracking for subtle background shift
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.the-void-gradient').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Add periodic glitch effect to text
        setInterval(() => {
            const text = document.querySelector('.glitch-text');
            text.classList.add('opacity-80');
            setTimeout(() => {
                text.classList.remove('opacity-80');
            }, 50);
        }, 4000);
    </script>
